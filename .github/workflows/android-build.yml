name: NEXUS Android Build
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build Debug APK
        working-directory: nexus-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Build Release APK
        working-directory: nexus-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: nexus-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-release-apk
          path: nexus-app/app/build/outputs/apk/release/*.apk
          retention-days: 30
      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: nexus-app/app/build/reports/
          retention-days: 7
