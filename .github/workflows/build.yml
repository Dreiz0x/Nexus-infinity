name: Build NEXUS APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          cd nexus-app
          chmod +x gradlew
          export GRADLE_OPTS="-Xmx2g -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: nexus-app/app/build/outputs/apk/debug/app-debug.apk
